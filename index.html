<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Liberty City Stories - PSP Web</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #f3f3f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.alphacoders.com/941/94165.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        button {
            padding: 20px 50px;
            font-size: 24px;
            background: #f0131e;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(240, 19, 30, 0.4);
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">LIBERTY CITY STORIES</h1>
        <button onclick="launchEmulator()">START GAME</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        window.onbeforeunload = function() { return "Warning: Leaving the game."; };

        function launchEmulator() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            window.EJS_player = '#game';
            window.EJS_core = 'psp'; 
            window.EJS_threads = true; 
            window.EJS_gameUrl = 'https://archive.org/download/grand-theft-auto-vice-city-stories_202512/Grand%20Theft%20Auto%20-%20Liberty%20City%20Stories.iso';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

            const loader = document.createElement('script');
            loader.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.head.appendChild(loader);
        }
    </script>
</body>
</html>
