<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Liberty City Stories - PSP Web</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #f3f3f3;
            font-family: sans-serif;
            overflow: hidden;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            text-align: center;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        button {
            padding: 20px 50px;
            font-size: 24px;
            background: #f0131e;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>GTA: LIBERTY CITY STORIES</h1>
        <p>Bypassing CORS and Loading Game...</p>
        <button onclick="launchEmulator()">START GAME</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        // Prevent accidental tab closing
        window.onbeforeunload = function() { return "Progress will be lost!"; };

        function launchEmulator() {
            // Enter Fullscreen
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // EMULATORJS CONFIG
            window.EJS_player = '#game';
            window.EJS_core = 'psp'; 
            window.EJS_threads = true; 

            // THE CORS FIX:
            const rawGameUrl = 'https://archive.org/download/grand-theft-auto-vice-city-stories_202512/Grand%20Theft%20Auto%20-%20Liberty%20City%20Stories.iso';
            window.EJS_gameUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawGameUrl);
            
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

            // Load the engine
            const loader = document.createElement('script');
            loader.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.head.appendChild(loader);
        }
    </script>
</body>
</html>
